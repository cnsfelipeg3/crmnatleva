<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="color-scheme" content="dark light" />
    <meta name="theme-color" content="#0d2620" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />

    <!-- Security headers (defense-in-depth; primary protection lives at the CDN/server) -->
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <meta http-equiv="Permissions-Policy" content="geolocation=(self), microphone=(self), camera=()" />
    <!-- TODO: Set the document title to the name of your application -->
    <title>NatLeva CRM</title>
    <meta name="description" content="NatLeva — Viagens são a vida em movimento" />
    <meta name="author" content="NatLeva" />
    <link rel="icon" href="/favicon.png?v=3" type="image/png" sizes="any" />
    <link rel="shortcut icon" href="/favicon.png?v=3" type="image/png" />
    <link rel="apple-touch-icon" href="/favicon.png?v=3" />

    <!-- Performance: warm up connections to backend & fonts before JS asks for them -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://mexlhkqcmiaktjxsyvod.supabase.co" crossorigin />
    <link rel="dns-prefetch" href="https://mexlhkqcmiaktjxsyvod.supabase.co" />

    <!-- Fonts loaded here (not via CSS @import) for faster paint and to avoid render-blocking -->
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Instrument+Sans:wght@400;600&family=JetBrains+Mono:wght@400&display=swap"
      onload="this.onload=null;this.rel='stylesheet'"
    />
    <noscript>
      <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Instrument+Sans:wght@400;600&family=JetBrains+Mono:wght@400&display=swap" />
    </noscript>

    <meta property="og:title" content="Cadastro de Passageiro · NatLeva" />
    <meta property="og:description" content="Preencha seus dados com segurança para a NatLeva organizar sua viagem." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://adm.natleva.com/og-cadastro-passageiro.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Cadastro de Passageiro · NatLeva" />
    <meta name="twitter:description" content="Preencha seus dados com segurança para a NatLeva organizar sua viagem." />
    <meta name="twitter:image" content="https://adm.natleva.com/og-cadastro-passageiro.jpg" />
  </head>

  <body>
    <script>if(localStorage.getItem('theme')==='dark')document.documentElement.classList.add('dark')</script>
    <style>
      /* Instant pre-React loader — paints before any JS runs */
      #boot-loader{position:fixed;inset:0;z-index:99999;display:flex;flex-direction:column;align-items:center;justify-content:center;background:linear-gradient(to top,hsl(158,50%,6%),hsl(158,40%,10%) 60%,hsl(210,30%,12%));font-family:system-ui,-apple-system,sans-serif;transition:opacity .35s ease}
      #boot-loader.hide{opacity:0;pointer-events:none}
      #boot-loader .ring{width:42px;height:42px;border:3px solid hsla(160,60%,50%,.2);border-top-color:hsl(160,60%,50%);border-radius:50%;animation:bl-spin .9s linear infinite}
      #boot-loader .txt{margin-top:18px;color:hsl(158,12%,70%);font-size:13px;letter-spacing:.18em;text-transform:uppercase}
       @keyframes bl-spin{to{transform:rotate(360deg)}}
    </style>
    <div id="boot-loader"><div class="ring"></div><div class="txt">NatLeva</div></div>
    <div id="root"></div>
    <script>
      // Safety net: if React fails to mount (e.g. chunk error), hide loader after 12s
      // so the user isn't stuck on an infinite spinner.
      setTimeout(function(){var el=document.getElementById('boot-loader');if(el){el.classList.add('hide');setTimeout(function(){el.remove()},400)}},12000);
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
